<!-- ============================================
     BUTTON SHOWCASE - Demo of all button styles
     ============================================ -->

<div style="padding: 40px; background: var(--bo-bg-primary);">
  
  <!-- Primary Buttons -->
  <section style="margin-bottom: 40px;">
    <h2 style="margin-bottom: 20px; color: var(--bo-text-primary);">Primary Buttons</h2>
    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
      <button class="btn-primary-enhanced">
        <span class="btn-icon">✨</span>
        Create Event
      </button>
      <button class="btn-primary-enhanced">
        <span class="btn-icon">➕</span>
        Add New
      </button>
      <button class="btn-primary-enhanced">
        <span class="btn-icon">💾</span>
        Save Changes
      </button>
      <button class="btn-primary-enhanced" disabled>
        <span class="btn-icon">🔒</span>
        Disabled
      </button>
    </div>
  </section>

  <!-- Secondary Buttons -->
  <section style="margin-bottom: 40px;">
    <h2 style="margin-bottom: 20px; color: var(--bo-text-primary);">Secondary Buttons</h2>
    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
      <button class="btn-secondary-enhanced">
        <span>📄</span>
        Export CSV
      </button>
      <button class="btn-secondary-enhanced">
        <span>📊</span>
        Export Excel
      </button>
      <button class="btn-secondary-enhanced">
        <span>🔍</span>
        Search
      </button>
    </div>
  </section>

  <!-- Action Icons -->
  <section style="margin-bottom: 40px;">
    <h2 style="margin-bottom: 20px; color: var(--bo-text-primary);">Action Icons</h2>
    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <button class="btn-action-enhanced view btn-tooltip" data-tooltip="View Details">
        <span class="action-icon">👁️</span>
      </button>
      <button class="btn-action-enhanced edit btn-tooltip" data-tooltip="Edit Event">
        <span class="action-icon">✏️</span>
      </button>
      <button class="btn-action-enhanced delete btn-tooltip" data-tooltip="Delete Event">
        <span class="action-icon">🗑️</span>
      </button>
    </div>
  </section>

  <!-- Icon Buttons -->
  <section style="margin-bottom: 40px;">
    <h2 style="margin-bottom: 20px; color: var(--bo-text-primary);">Icon Buttons (Small)</h2>
    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <button class="btn-icon-enhanced">⚙️</button>
      <button class="btn-icon-enhanced">🔔</button>
      <button class="btn-icon-enhanced">❤️</button>
      <button class="btn-icon-enhanced">⭐</button>
    </div>
  </section>

  <!-- Badges -->
  <section style="margin-bottom: 40px;">
    <h2 style="margin-bottom: 20px; color: var(--bo-text-primary);">Enhanced Badges</h2>
    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <span class="badge-enhanced badge-primary">Primary</span>
      <span class="badge-enhanced badge-success">Success</span>
      <span class="badge-enhanced badge-warning">Warning</span>
      <span class="badge-enhanced badge-danger">Danger</span>
    </div>
  </section>

  <!-- Loading State -->
  <section style="margin-bottom: 40px;">
    <h2 style="margin-bottom: 20px; color: var(--bo-text-primary);">Loading State</h2>
    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
      <button class="btn-primary-enhanced btn-loading">
        <span class="btn-icon">💾</span>
        Saving...
      </button>
    </div>
  </section>

</div>
