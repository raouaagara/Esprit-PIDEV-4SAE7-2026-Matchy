<div class="confirmation-overlay" *ngIf="isVisible" (click)="onCancel()">
  <div class="confirmation-dialog" [class]="'type-' + config.type" (click)="$event.stopPropagation()">
    <div class="dialog-icon">
      <span class="icon-emoji">{{ getIcon() }}</span>
    </div>
    
    <div class="dialog-content">
      <h2 class="dialog-title">{{ config.title }}</h2>
      <p class="dialog-message">{{ config.message }}</p>
    </div>
    
    <div class="dialog-actions">
      <button class="btn btn-cancel" (click)="onCancel()">
        <span class="btn-icon">✕</span>
        {{ config.cancelText }}
      </button>
      <button class="btn btn-confirm" [class]="'btn-' + config.type" (click)="onConfirm()">
        <span class="btn-icon">✓</span>
        {{ config.confirmText }}
      </button>
    </div>
  </div>
</div>
