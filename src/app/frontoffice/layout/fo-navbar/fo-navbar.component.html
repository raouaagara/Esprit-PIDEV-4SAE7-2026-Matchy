<nav class="fo-navbar" [class.scrolled]="isScrolled">
  <div class="nav-container">
    <!-- Logo -->
    <a routerLink="/" class="nav-logo">
      <div class="logo-icon">M</div>
      <span class="logo-text">Match<span class="logo-accent">y</span></span>
    </a>

    <!-- Center Links -->
    <ul class="nav-links" [class.open]="isMenuOpen">
      <li><a href="#how-it-works" class="nav-link">How it works</a></li>
      <li><a href="#who-we-are" class="nav-link">Who we are</a></li>
      <li><a routerLink="/events" class="nav-link">Events</a></li>
      <li><a routerLink="/content-list" class="nav-link">📚 Contents</a></li>
      <li *ngIf="authService.isAuthenticated">
        <a routerLink="/projects-milestones" class="nav-link">My Projects</a>
      </li>
      <li *ngIf="authService.isAuthenticated">
        <a routerLink="/subscription-management" class="nav-link"
          >Subscription</a
        >
      </li>
      <li *ngIf="authService.isAuthenticated" class="nav-user">
        <span class="user-greeting"
          >Hello, {{ authService.currentUser?.name }}</span
        >
        <span class="user-dot"></span>
      </li>
    </ul>

    <!-- Right Actions -->
    <div class="nav-actions">
      <a
        *ngIf="authService.isAuthenticated"
        routerLink="/profile-settings"
        class="btn-profile"
        title="Profile Settings"
      >
        ⚙️
      </a>
      <button
        *ngIf="authService.isAuthenticated"
        class="btn-dashboard"
        (click)="goToDashboard()"
      >
        My Dashboard
      </button>
      <a
        *ngIf="!authService.isAuthenticated"
        routerLink="/backoffice/login"
        class="btn-dashboard"
      >
        My Dashboard
      </a>

      <!-- Hamburger -->
      <button
        class="hamburger"
        (click)="toggleMenu()"
        [class.active]="isMenuOpen"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
