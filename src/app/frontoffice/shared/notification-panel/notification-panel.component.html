<div class="notifications-container">
  <!-- Bouton Notifications -->
  <button class="btn-notifications" (click)="toggleDropdown()">
    🔔 Notifications
    <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount }}</span>
  </button>

  <!-- Dropdown Panel -->
  <div class="notifications-dropdown" *ngIf="showDropdown" [@slideDown]>
    <!-- Header -->
    <div class="notifications-header">
      <h3>Notifications</h3>
      <div class="header-actions">
        <button
          *ngIf="unreadCount > 0"
          class="btn-mark-all"
          (click)="markAllAsRead()"
          title="Mark all as read"
        >
          ✓ Mark all read
        </button>
        <button class="btn-close" (click)="toggleDropdown()">✕</button>
      </div>
    </div>

    <!-- Notifications List -->
    <div
      class="notifications-list"
      *ngIf="notifications.length > 0; else emptyState"
    >
      <div
        *ngFor="let notif of notifications"
        class="notification-item"
        [class.unread]="!notif.read"
        [class.type-certificate]="notif.type === 'certificate'"
      >
        <!-- Icon et contenu -->
        <div class="notification-content">
          <div class="notification-icon">{{ notif.icon }}</div>
          <div class="notification-text">
            <h4 class="notification-title">{{ notif.title }}</h4>
            <p class="notification-message">{{ notif.message }}</p>
            <span class="notification-time">{{
              getTimeAgo(notif.timestamp)
            }}</span>
          </div>
        </div>

        <!-- Actions -->
        <div class="notification-actions">
          <button
            *ngIf="!notif.read"
            class="btn-read"
            (click)="markAsRead(notif.id)"
            title="Mark as read"
          >
            •
          </button>
          <button
            class="btn-delete"
            (click)="deleteNotification(notif.id)"
            title="Delete"
          >
            ✕
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <ng-template #emptyState>
      <div class="notifications-empty">
        <div class="empty-icon">📭</div>
        <p>No notifications yet</p>
      </div>
    </ng-template>

    <!-- Footer -->
    <div *ngIf="notifications.length > 0" class="notifications-footer">
      <button class="btn-clear-all" (click)="clearAll()">
        Clear all notifications
      </button>
    </div>
  </div>
</div>

<!-- Backdrop -->
<div
  *ngIf="showDropdown"
  class="notifications-backdrop"
  (click)="toggleDropdown()"
></div>
