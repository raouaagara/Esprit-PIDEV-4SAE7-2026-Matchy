<div class="notification-bell">
  <button class="bell-button" (click)="toggleDropdown()" [class.has-unread]="unreadCount > 0">
    <span class="bell-icon">🔔</span>
    <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
  </button>

  <div class="notification-dropdown" *ngIf="isOpen" [@slideDown]>
    <!-- Header -->
    <div class="dropdown-header">
      <h3 class="header-title">Notifications</h3>
      <button 
        *ngIf="notifications.length > 0" 
        class="mark-all-btn" 
        (click)="markAllAsRead()"
      >
        Mark all as read
      </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading notifications...</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && notifications.length === 0" class="empty-state">
      <span class="empty-icon">📭</span>
      <p>No notifications yet</p>
      <small>We'll notify you when something happens</small>
    </div>

    <!-- Notifications List -->
    <div *ngIf="!loading && notifications.length > 0" class="notifications-list">
      <div 
        *ngFor="let notification of notifications" 
        class="notification-item"
        [class.unread]="!notification.isRead"
        (click)="handleNotificationClick(notification)"
      >
        <div class="notification-icon" [class]="getNotificationClass(notification.type)">
          {{ getNotificationIcon(notification.type) }}
        </div>
        <div class="notification-content">
          <h4 class="notification-title">{{ notification.title }}</h4>
          <p class="notification-message">{{ notification.message }}</p>
          <span class="notification-time">{{ notification.createdAt | date:'short' }}</span>
        </div>
        <button 
          *ngIf="!notification.isRead" 
          class="mark-read-btn" 
          (click)="markAsRead(notification.id, $event)"
          title="Mark as read"
        >
          ✓
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div *ngIf="notifications.length > 0" class="dropdown-footer">
      <a routerLink="/notifications" class="view-all-link" (click)="closeDropdown()">
        View all notifications →
      </a>
    </div>
  </div>

  <!-- Backdrop -->
  <div *ngIf="isOpen" class="backdrop" (click)="closeDropdown()"></div>
</div>
