<div class="login-page">
  <div class="login-bg">
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
  </div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">M</div>
      <span class="logo-text">Match<span class="accent">y</span></span>
    </div>

    <!-- Success state -->
    <div *ngIf="success" class="success-box">
      <div class="success-icon">✅</div>
      <h2>Check your email</h2>
      <p>We sent a password reset link to <strong>{{ form.get('email')?.value }}</strong></p>
      <a routerLink="/backoffice/login" class="btn-login" style="display:block; text-align:center; margin-top:20px;">
        ← Back to Login
      </a>
    </div>

    <!-- Form state -->
    <div *ngIf="!success">
      <h1 class="login-title">Forgot Password?</h1>
      <p class="login-sub">Enter your email and we'll send you a reset link</p>

      <div class="login-error" *ngIf="error">
        <span>⚠️ {{ error }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="admin@matchy.tn"
            class="form-input"
            [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched">
          <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Valid email required
          </span>
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading || form.invalid">
          <span *ngIf="!isLoading">Send Reset Link →</span>
          <span *ngIf="isLoading">Sending...</span>
        </button>
      </form>

      <a routerLink="/backoffice/login" class="back-link">← Back to Login</a>
    </div>
  </div>
</div>
