<button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
  <svg *ngIf="isDark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg *ngIf="!isDark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="login-page">

  <!-- Canvas animation -->
  <canvas #canvasEl class="login-canvas"></canvas>

  <!-- Glow orbs -->
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>

  <!-- Card -->
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">M</div>
      <span class="logo-text">Match<span class="accent">y</span></span>
    </div>

    <!-- Steps -->
    <div class="steps">
      <div class="step on"></div>
      <div class="step"></div>
      <div class="step"></div>
      <span class="step-label">· Sign in</span>
    </div>

    <h1 class="login-title"> <span class="title-gradient">Login</span></h1>
    <p class="login-sub">Access the Matchy dashboard</p>

    <!-- Error -->
    <div class="login-error" *ngIf="error">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ error }}</span>
    </div>

    <!-- Form — logique originale 100% préservée -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="admin@matchy.tn"
          class="form-input"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Password</label>
          <a routerLink="/backoffice/forgot-password" class="forgot-link">Forgot your password?</a>
        </div>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="form-input"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">

        <!-- Password strength -->
        <div class="pw-strength" *ngIf="loginForm.get('password')?.value">
          <div class="pw-bars">
            <div class="pw-bar" *ngFor="let i of [1,2,3,4,5]"
                 [style.background]="i <= passwordStrength.score ? passwordStrength.color : 'rgba(255,255,255,0.08)'">
            </div>
          </div>
          <span class="pw-label" [style.color]="passwordStrength.color">
            {{ passwordStrength.label }}
          </span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading || loginForm.invalid">
        <span class="btn-inner" *ngIf="!isLoading">
          Sign In
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
        <span class="btn-spinner" *ngIf="isLoading">
          <span class="spinner"></span>
        </span>
      </button>

    </form>

    <!-- Divider -->
    <div class="divider"><span>or</span></div>

    <!-- Google Button -->
    <button type="button" class="btn-google" (click)="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <a routerLink="/" class="back-link">← Back to Matchy</a>

  </div>
</div>
