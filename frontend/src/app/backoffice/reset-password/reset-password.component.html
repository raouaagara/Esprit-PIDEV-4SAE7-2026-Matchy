<div class="login-page">
  <div class="login-bg">
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
  </div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">M</div>
      <span class="logo-text">Match<span class="accent">y</span></span>
    </div>

    <!-- Success -->
    <div *ngIf="success" class="success-box">
      <div class="success-icon">✅</div>
      <h2>Password updated!</h2>
      <p>Your password has been reset successfully. Redirecting to login...</p>
      <a routerLink="/backoffice/login" class="btn-login" style="display:block;text-align:center;margin-top:20px;text-decoration:none;">
        Go to Login →
      </a>
    </div>

    <!-- Form -->
    <div *ngIf="!success">
      <h1 class="login-title">New Password</h1>
      <p class="login-sub">Enter your new password below</p>

      <div class="login-error" *ngIf="error">
        <span>⚠️ {{ error }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

        <div class="form-group">
          <div class="label-row">
            <label>New Password</label>
          </div>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="newPassword"
              placeholder="Min. 6 characters"
              class="form-input"
              [class.invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
          <span class="field-error" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            Min 6 characters required
          </span>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="Repeat your password"
              class="form-input"
              [class.invalid]="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched">
            <button type="button" class="toggle-pw" (click)="showConfirm = !showConfirm">
              {{ showConfirm ? '🙈' : '👁️' }}
            </button>
          </div>
          <span class="field-error" *ngIf="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched">
            Passwords do not match
          </span>
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading || form.invalid">
          <span *ngIf="!isLoading">Reset Password →</span>
          <span *ngIf="isLoading">Updating...</span>
        </button>
      </form>

      <a routerLink="/backoffice/login" class="back-link">← Back to Login</a>
    </div>
  </div>
</div>
