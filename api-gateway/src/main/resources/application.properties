server.port=8080
spring.application.name=api-gateway

# ---- EUREKA ----
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ---- DISCOVERY LOCATOR ----
spring.cloud.gateway.discovery.locator.enabled=false

# ---- ROUTES ----

# Auth public (login, register, forgot-password, reset-password) - SANS JwtAuthFilter
spring.cloud.gateway.routes[0].id=auth-public
spring.cloud.gateway.routes[0].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/login,/api/auth/register,/api/auth/forgot-password,/api/auth/reset-password

# Auth protege - AVEC JwtAuthFilter
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**,/api/users/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[2].id=project-service
spring.cloud.gateway.routes[2].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/projects/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[3].id=proposal-service
spring.cloud.gateway.routes[3].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/proposals/**
spring.cloud.gateway.routes[3].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**,/ws/**

spring.cloud.gateway.routes[5].id=ai-service
spring.cloud.gateway.routes[5].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[5].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[6].id=chat-service
spring.cloud.gateway.routes[6].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/chat/**

spring.cloud.gateway.routes[7].id=google-oauth
spring.cloud.gateway.routes[7].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/auth/google,/api/auth/google/callback

spring.cloud.gateway.routes[8].id=matching-service
spring.cloud.gateway.routes[8].uri=lb://MATCHY-BACKEND
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/matching/**
spring.cloud.gateway.routes[8].filters[0]=JwtAuthFilter

# ---- CORS ----
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# ---- JWT ----
jwt.secret=matchySecretKey2024VeryLongAndSecureKeyForJWTSigning

# ---- ACTUATOR ----
management.endpoints.web.exposure.include=*