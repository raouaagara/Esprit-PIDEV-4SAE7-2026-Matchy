spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # PI Service Routes
        - id: pi-service
          uri: lb://PI
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
        
        # Direct route for testing
        - id: pi-service-direct
          uri: lb://PI
          predicates:
            - Path=/pi/**
          filters:
            - StripPrefix=1
            - RewritePath=/pi/(?<segment>.*), /api/$\{segment}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
